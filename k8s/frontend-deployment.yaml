apiVersion: apps/v1
kind: Deployment
metadata:
  name: housing-notes-frontend
  labels:
    app: housing-notes-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: housing-notes-frontend
  template:
    metadata:
      labels:
        app: housing-notes-frontend
    spec:
      containers:
        - name: frontend
          image: housing-notes-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: housing-notes-frontend
spec:
  selector:
    app: housing-notes-frontend
  ports:
    - port: 80
      targetPort: 80
