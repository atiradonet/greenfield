apiVersion: apps/v1
kind: Deployment
metadata:
  name: housing-notes-backend
  labels:
    app: housing-notes-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: housing-notes-backend
  template:
    metadata:
      labels:
        app: housing-notes-backend
    spec:
      containers:
        - name: backend
          image: housing-notes-backend:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: housing-notes-secrets
                  key: jwt-secret
          securityContext:
            privileged: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: housing-notes-backend
spec:
  selector:
    app: housing-notes-backend
  ports:
    - port: 80
      targetPort: 3001
